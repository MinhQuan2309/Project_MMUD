name: 🛡️ Security SAST & Secrets Scanning

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main", "dev" ]

jobs:
  # 1. TRUFFLEHOG: Quét lộ bí mật (Secrets, Keys, Passwords)
  trufflehog-scan:
    name: 🕵️ TruffleHog Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Bắt buộc để TruffleHog quét toàn bộ lịch sử commit

      - name: Run TruffleHog Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # 2. SEMGREP: Phân tích mã nguồn tĩnh tìm lỗi logic
  sast-semgrep:
    name: 🔬 Semgrep SAST Scan
    runs-on: ubuntu-latest
    needs: trufflehog-scan # Chạy sau khi check không lộ secret
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: "p/default" # Sử dụng bộ quy tắc bảo mật chuẩn của Semgrep