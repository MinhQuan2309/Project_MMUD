# monitoring/prometheus/prometheus.yml
global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kong-gateway'
    static_configs:
      - targets: ['kong:8001']   # Kong Admin API expose metrics

  - job_name: 'microservices'
    static_configs:
      - targets: ['order-service:9090', 'user-service:9090']
