_format_version: "3.0"

services:
  # --- LỄ TÂN (Bắt buộc dùng thẻ JWT) ---
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /api/v1/users
        strip_path: true
    plugins:
      - name: jwt # Áp dụng bảo vệ JWT riêng cho Service này

  # --- PHÒNG DỮ LIỆU (Bắt buộc dùng thẻ JWT) ---
  - name: resource-service
    url: http://resource-service:8000
    routes:
      - name: resource-route
        paths:
          - /api/v1/resources
        strip_path: true
    plugins:
      - name: jwt # Áp dụng bảo vệ JWT riêng cho Service này

  # --- PHÒNG THANH TOÁN (Mở cửa linh hoạt) ---
  - name: billing-service
    url: http://billing-service:8000
    routes:
      - name: billing-route
        paths:
          - /api/v1/billing
        strip_path: true
    # KHÔNG DÙNG PLUGIN JWT Ở ĐÂY ĐỂ ĐỐI TÁC GỬI WEBHOOK CÓ THỂ VÀO ĐƯỢC
    # (Phước đã tự code lớp bảo vệ bằng HMAC và JWT ở bên trong rồi)

plugins:
  # Chú ý: Đã xóa plugin JWT khỏi danh sách Global
  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
      headers:
        - Accept
        - Accept-Version
        - Content-Type
        - Authorization

consumers:
  - username: auth0-auth-server
  - username: internal-system

