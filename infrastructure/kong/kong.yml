_format_version: "3.0"

services:
  - name: dummy-backend
    url: http://httpbin.org
    routes:
      - name: secure-route
        paths:
          - /api/v1/secure

plugins:
  - name: jwt
    config:
      claims_to_verify:
        - exp
  - name: rate-limiting
    config:
      minute: 5
      policy: local

consumers:
  - username: auth0-auth-server

