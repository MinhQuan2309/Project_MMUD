_format_version: "3.0"

services:
  # 1. ĐỊNH TUYẾN VÀO USER SERVICE (Nơi có quầy Lễ tân cấp/đổi thẻ)
  - name: user-service
    url: http://user-service:8000
    routes:
      - name: user-route
        paths:
          - /api/v1/users
        strip_path: true

  # 2. ĐỊNH TUYẾN VÀO RESOURCE SERVICE (Phòng dữ liệu)
  - name: resource-service
    url: http://resource-service:8000
    routes:
      - name: resource-route
        paths:
          - /api/v1/resources
        strip_path: true

  # 3. ĐỊNH TUYẾN VÀO BILLING SERVICE (Phòng thanh toán)
  - name: billing-service
    url: http://billing-service:8000
    routes:
      - name: billing-route
        paths:
          - /api/v1/billing
        strip_path: true

plugins:
  - name: jwt
    config:
      claims_to_verify:
        - exp

  - name: rate-limiting
    config:
      minute: 100
      policy: local

  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - DELETE
      headers:
        - Accept
        - Accept-Version
        - Content-Type
        - Authorization

consumers:
  - username: auth0-auth-server
  - username: internal-system # MỚI: Khai báo thêm "nhân sự" nội bộ

